
name: svla_action_extractor
logdir: ../outputs/action_extractor
seed: 0

data:
  target: ldwma.lightning.data_modules.lerobot_so100.SO100DataModule
  params:
    root: ../data/so100_stride5
    remote: False
    dataset_paths: auto
    action_stats_path: ../data/so100_stride5/so100_action_statistics.json
    normalize_actions: True
    batch_size: 16
    num_workers: 2
    pin_memory: True
    target_height: 320
    target_width: 512
    pad: True
    camera_key: auto
    traj_len: 16
    val_fraction: 0.05
    downsample: 1
    use_language: False

model:
  target: ldwma.models.action_extractor.SO100ActionExtractor
  params:
    action_dims: 6
    base_channels: 32
    channel_mults: [1, 2, 4, 4]
    blocks_per_stage: 2
    temporal_hidden: 256
    temporal_layers: 1
    mlp_hidden: 256
    dropout: 0.1
    learning_rate: 3e-4
    weight_decay: 1e-4

lightning:
  trainer:
    accelerator: gpu
    devices: 1
    precision: 16
    max_steps: 50000
    check_val_every_n_epoch: 1
    log_every_n_steps: 20
    num_sanity_val_steps: 0
    gradient_clip_val: 1.0
    gradient_clip_algorithm: norm
  logger:
    target: pytorch_lightning.loggers.WandbLogger
    params:
      save_dir: ../outputs/wandb/svla_action_extractor/
      offline: False
      project: svla_action_extractor
      entity: seung_cheol
      name: svla_action_extractor
      group: svla_action_extractor
      log_model: False
  watch_model:
    enabled: True
    log: gradients
    log_freq: 200
  callbacks:
    model_checkpoint:
      target: pytorch_lightning.callbacks.ModelCheckpoint
      params:
        dirpath: ../outputs/action_extractor/checkpoints
        filename: "{epoch}-{step}"
        monitor: val/mae
        mode: min
        save_top_k: 3
        save_last: True
        every_n_epochs: 1
    learning_rate_monitor:
      target: pytorch_lightning.callbacks.LearningRateMonitor
      params:
        logging_interval: step

name: dacon_action_extractor
logdir: ../outputs/action_extractor
seed: 0

data:
  target: ldwma.lightning.data_modules.challenge_action.ChallengeActionDataModule
  params:
    challenge_root: ../private_data/challenge
    answer_video_root: ../private_data/answers/videos
    action_stats_path: ../private_data/so100_action_statistics.json
    normalize_actions: True
    batch_size: 16
    num_workers: 2
    pin_memory: True
    target_height: 320
    target_width: 512
    temporal_length: 16
    pad: True
    val_fraction: 0.1
    seed: 0
    shuffle: True

model:
  target: ldwma.models.action_extractor.SO100ActionExtractor
  params:
    action_dims: 6
    base_channels: 32
    channel_mults: [1, 2, 4, 4]
    blocks_per_stage: 2
    temporal_hidden: 256
    temporal_layers: 1
    mlp_hidden: 256
    dropout: 0.0
    learning_rate: 5e-4
    weight_decay: 1e-5

lightning:
  trainer:
    accelerator: gpu
    devices: 1
    precision: 16
    max_epochs: 300
    check_val_every_n_epoch: 1
    log_every_n_steps: 5
    num_sanity_val_steps: 0
    gradient_clip_val: 1.0
    gradient_clip_algorithm: norm
  logger:
    target: pytorch_lightning.loggers.WandbLogger
    params:
      save_dir: ../outputs/wandb/dacon_action_extractor/
      offline: False
      project: dacon_action_extractor
      entity: seung_cheol
      name: dacon_action_extractor_eval_split
      group: dacon_action_extractor
      log_model: False
  watch_model:
    enabled: True
    log: gradients
    log_freq: 200
  callbacks:
    model_checkpoint:
      target: pytorch_lightning.callbacks.ModelCheckpoint
      params:
        dirpath: ../outputs/action_extractor/checkpoints
        filename: "{epoch}-{step}"
        monitor: val/mae
        mode: min
        save_top_k: 3
        save_last: True
        every_n_epochs: 1
        auto_insert_metric_name: False
    learning_rate_monitor:
      target: pytorch_lightning.callbacks.LearningRateMonitor
      params:
        logging_interval: step